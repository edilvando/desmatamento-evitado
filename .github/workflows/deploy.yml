name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - [cite_start]name: Checkout [cite: 77]
        [cite_start]uses: actions/checkout@v4 [cite: 78]

      - [cite_start]name: Setup Node [cite: 79]
        [cite_start]uses: actions/setup-node@v4 [cite: 80]
        with:
          [cite_start]node-version: 22 [cite: 82]

      - [cite_start]name: Setup pnpm [cite: 83]
        [cite_start]uses: pnpm/action-setup@v4 [cite: 84]
        # Removida a linha "version: 10" para evitar o erro de multiplas versões 

      - [cite_start]name: Install dependencies [cite: 87]
        [cite_start]run: pnpm install [cite: 87]

      - [cite_start]name: Build [cite: 88]
        [cite_start]run: pnpm build [cite: 89]

      - [cite_start]name: Setup Pages [cite: 90]
        [cite_start]uses: actions/configure-pages@v5 [cite: 91]

      - [cite_start]name: Upload artifact [cite: 92]
        [cite_start]uses: actions/upload-pages-artifact@v3 [cite: 93]
        with:
          [cite_start]path: "./dist/public" [cite: 96]

  deploy:
    [cite_start]needs: build [cite: 100]
    [cite_start]runs-on: ubuntu-latest [cite: 99]
    environment:
      [cite_start]name: github-pages [cite: 98]
      [cite_start]url: ${{ steps.deployment.outputs.page_url }} [cite: 99]
    steps:
      - [cite_start]name: Deploy to GitHub Pages [cite: 102]
        [cite_start]id: deployment [cite: 103]
        [cite_start]uses: actions/deploy-pages@v4 [cite: 104]